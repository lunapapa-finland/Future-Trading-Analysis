paths:
  performance_csv: data/performance/Performance_sum.csv
  journal_live_csv: data/performance/journal_live.csv
  journal_adjustments_csv: data/performance/journal_adjustments.csv
  journal_matches_csv: data/performance/journal_matches.csv
  taxonomy_csv: data/metadata/taxonomy.csv
  contract_specs_csv: data/metadata/contract_specs.csv
  day_plan_csv: data/performance/day_plan.csv
  cashflow_csv: data/portfolio/cashflow.csv
  trade_sum_csv: data/portfolio/trade_sum.csv
  audit_log_jsonl: data/audit/change_audit.jsonl

ui:
  # Chart interval options shown in timeframe controls.
  timeframes: [5m, 15m, 30m, 1h, 4h, 1d, 1w]
  # Replay speed presets in seconds per bar.
  playback_speeds: [15, 30, 45, 60]

live_journal:
  # Live journal guardrail for daily trade count.
  daily_max_trade: 5
  # Live journal guardrail for realized daily loss.
  daily_max_loss: 300.0

data_fetch:
  # Minutes to wait after a yfinance rate-limit response.
  rate_limit_cooldown_minutes: 60
  # Default retry attempts for manual data fetch.
  manual_max_retries: 3
  # Default delay between manual fetch retries in seconds.
  manual_retry_delay_seconds: 10

analysis:
  # Starting equity for portfolio and Sharpe calculations.
  initial_net_liq: 10000.0
  # Annual risk-free rate as a decimal, for example 0.02 for 2%.
  risk_free_rate: 0.02
  # Baseline date for portfolio reporting.
  portfolio_start_date: '2025-11-01'
  timezone: "US/Central"
  # Default analysis filter for unmatched live journal rows.
  include_unmatched_default: true
  session:
    start: "08:30"
    end: "15:10"
    phase_windows:
      open_start: "08:30"
      open_end: "10:00"
      middle_end: "14:00"
      end_end: "15:10"
  rule_compliance:
    # Daily trade-count threshold.
    max_trades_per_day: 8
    # Consecutive losing-trade threshold.
    max_consecutive_losses: 3
    # Daily realized loss threshold in account currency.
    max_daily_loss: 500.0
    # Single-trade loss threshold used by rule checks.
    big_loss_threshold: 200.0
    # Allowed trades after a big-loss event.
    max_trades_after_big_loss: 2

tagging:
  # Reject journal tags outside the taxonomy when enabled.
  strict_mode: true

symbols:
  default_performance_file: data/performance/Performance_sum.csv
